<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuocLieuVN - Nghiên cứu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js"></script>
    <script src="js/research.js"></script>
    <script>
      window.onload = async function(){
        loadAllResearch(0);
      }
    </script>
</head>
<body>
<header id="header-main"></header>

<div class="container py-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
      <h1 class="h3 fw-bold text-dark">Nghiên cứu</h1>
      <p class="text-muted">Danh sách các đề tài nghiên cứu khoa học về dược liệu</p>
    </div>
  </div>

  <div class="bg-white p-4 rounded shadow-sm mb-5">
    <div class="row g-3">
      <div class="col-md-5">
        <div class="position-relative">
          <input onkeyup="loadAllResearch(0)" id="param" type="text" class="form-control pe-5" placeholder="Tìm kiếm nghiên cứu theo tiêu đề, tác giả...">
          <button class="btn btn-sm btn-link position-absolute end-0 top-50 translate-middle-y text-secondary">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>
      <div class="col-md-4">
        <input onkeyup="loadAllResearch(0)" id="field" type="text" class="form-control" placeholder="Lĩnh vực nghiên cứu">
      </div>
      <div class="col-md-3">
        <input onchange="loadAllResearch(0)" id="year" type="number" class="form-control" placeholder="Năm xuất bản">
      </div>
    </div>
  </div>

  <div class="d-flex flex-column gap-4 mb-4" id="list-research"></div>

  <nav class="d-flex justify-content-center mb-5">
    <ul class="pagination pagination-sm mb-0" id="pageable"></ul>
  </nav>
</div>

<footer class="pt-5" id="footer-main"></footer>
<th:block th:replace="user/chat :: chatMain">
</th:block>
</body>
</html>
